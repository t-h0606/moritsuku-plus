<!DOCTYPE html>
<!-- もりつく＋ v48（2026-07-24）
     v24（単一10MB）から、HTML / CSS / JS / 画像 / データ に分割。見た目と動作は同一。
     更新するファイル： data/articles.json（記事） data/videos.json（動画） data/weather.json（天気・自動） -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>もりつく＋ | 守谷〜つくばをつなぐ、まちの報道局</title>
<meta name="description" content="守谷・つくばみらい・つくば、TX沿線3市のニュース・イベント・グルメをお届けする、まちの報道局。">
<meta name="theme-color" content="#16203A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="もりつく＋">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>


<!-- ① ロゴ / ② 駅セレクタ -->
<header class="studio-head">
  <div class="wrap">
    <div class="head-top">
      <div class="brand">
        <h1 class="logo"><img src="images/logo-moritsuku.webp" alt="もりつく＋" width="459" height="144"></h1>
        <div class="tagline">守谷〜つくばをつなぐ、まちの報道局</div>
      </div>
      <div class="onair-lamp"><span class="bulb"></span>ON AIR</div>
    </div>
  </div>
</header>

<!-- ② もりつく気象台（茨城県南部の予報1本。キャスターが日替わりで交代） -->
<section class="weather-sec" id="sec-weather">
  <div class="wrap">
    <div class="sec-head">
      <div>
        <h2 class="sec-title">もりつく気象台</h2>
      </div>
    </div>
    <div class="weather-card" id="weatherCard"></div>
    <div class="weather-note">気象データ提供：気象庁</div>
  </div>
</section>

<!-- ③ まちの新着ニュース（毎日更新ゾーン。ジャンル絞り込みはこのセクション専属） -->
<section id="sec-articles">
  <div class="wrap">
    <!-- 日替わりリポーター（午前5時に交代）＋見出し＋ジャンルチップ -->
    <div class="news-head">
      <div class="news-caster" id="newsCaster">
        <img id="newsCasterImg" alt="">
      </div>
      <div class="news-head-main">
        <div class="sec-head">
          <div>
            <h2 class="sec-title">まちの新着ニュース</h2>
          </div>
        </div>
        <!-- 駅セレクタ（記事の地域絞り込み専用。v27でヘッダーからここへ移設） -->
        <nav class="rail-nav" aria-label="地域で絞り込み">
          <div class="rail">
            <button class="station" data-city="all" aria-pressed="true" style="--stn:var(--ink)">
              <span class="dot"></span>すべて
            </button>
            <button class="station" data-city="moriya" aria-pressed="false" style="--stn:var(--c-moriya)">
              <span class="dot"></span>守谷
            </button>
            <button class="station" data-city="tsukubamirai" aria-pressed="false" style="--stn:var(--c-mirai)">
              <span class="dot"></span>つくばみらい
            </button>
            <button class="station" data-city="tsukuba" aria-pressed="false" style="--stn:var(--c-tsukuba)">
              <span class="dot"></span>つくば
            </button>
          </div>
        </nav>
    <div class="genre-row" role="group" aria-label="ジャンルで絞り込み">
      <button class="chip" data-cat="all" aria-pressed="true">最新記事</button>
      <button class="chip" data-cat="news" aria-pressed="false">ニュース</button>
      <button class="chip" data-cat="video" aria-pressed="false">動画</button>
      <button class="chip" data-cat="event" aria-pressed="false">イベント</button>
      <button class="chip" data-cat="gourmet" aria-pressed="false">グルメ</button>
      <button class="chip" data-cat="kids" aria-pressed="false">キッズ</button>
      <button class="chip" data-cat="ibaraki" aria-pressed="false">県内全域</button>
        </div>
      </div>
    </div>
    <div class="card-grid" id="feed"></div>
    <div class="empty" id="emptyNote" hidden>この条件の記事はまだ入電していません。</div>
  </div>
</section>

<!-- ④ おすすめ動画 -->
<section class="dark" id="sec-video">
  <div class="wrap">
    <div class="sec-head">
      <div class="onair-head">
        <h2 class="sec-title">今週のオンエア</h2>
        <!-- 日替わりの制作班スタッフ（午前5時に交代）。見出しの「ア」の後ろに立つ -->
        <div class="onair-caster" id="onairCaster">
          <img id="onairCasterImg" alt="">
        </div>
      </div>
    </div>

    <div class="video-lead" id="videoLead"></div>

    <!-- ⑤ 次の放送（data/videos.json の next から描画） -->
    <div class="next-strip" id="nextStrip"></div>
  </div>
</section>

<!-- ⑥ 過去放送 -->
<section class="dark deep" id="sec-library">
  <div class="wrap">
    <div class="sec-head">
      <div>
        <h2 class="sec-title">放送ライブラリー</h2>
      </div>
      <span class="sec-note">過去のオンエアを横スクロールで</span>
    </div>
    <div class="shelf" id="shelf"></div>
  </div>
</section>

<!-- 動画ジャンル選択時のみ：記事カードがここ（放送ライブラリーの下）へ移動する受け皿 -->
<section id="sec-feed-slot" hidden>
  <div class="wrap" id="feedSlot"></div>
</section>

<!-- ⑧ スタッフ紹介 -->
<section class="staff-sec" id="sec-staff">
  <div class="wrap">
    <div class="sec-head">
      <div>
        <span class="eyebrow">BACKSTAGE</span>
        <h2 class="sec-title">スタッフ紹介</h2>
      </div>
    </div>
    <div class="staff-grid" id="staff"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="f-logo">もりつく＋</div>
    <div class="links">
      <a href="#">会社概要</a><a href="#">番組表</a><a href="#">お問い合わせ</a><a href="#">出演・情報提供</a>
    </div>
    <div class="disc">
      もりつく＋は架空のローカルテレビ局です。掲載しているニュース・イベント・グルメ情報は実在のものであり、見出しは各配信元の記事へリンクしています。<br>
      記事の著作権はすべて各配信元に帰属します。
    </div>
  </div>
</footer>

<script src="js/app.js"></script>
</body>
</html>
